<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clue Stories</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --paper: #ffffff;
      --ink: #18202a;
      --muted: #5c6675;
      --line: #d9e0ea;
      --teal: #176b5d;
      --teal-strong: #10564b;
      --coral: #b94e45;
      --gold: #d39b2f;
      --blue: #2f66b3;
      --shadow: 0 18px 45px rgba(24, 32, 42, 0.1);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(23, 107, 93, 0.08), transparent 34%),
        linear-gradient(315deg, rgba(47, 102, 179, 0.08), transparent 30%),
        var(--bg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    button,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 700;
    }

    button:focus-visible,
    textarea:focus-visible,
    summary:focus-visible {
      outline: 3px solid rgba(47, 102, 179, 0.35);
      outline-offset: 2px;
    }

    .app {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      display: grid;
      width: 42px;
      height: 42px;
      place-items: center;
      border-radius: 8px;
      color: #ffffff;
      background: linear-gradient(135deg, var(--teal), var(--blue));
      font-weight: 900;
      letter-spacing: 0;
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.55rem, 2.2vw, 2.15rem);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .status {
      min-width: 142px;
      color: var(--muted);
      font-size: 0.93rem;
      text-align: right;
    }

    .ghost-button {
      color: var(--teal-strong);
      background: #e9f3f0;
      padding: 10px 14px;
    }

    .story-shell {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    .story-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: start;
      padding: 24px 24px 18px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #ffffff, #f8fbfd);
    }

    .progress-label {
      margin: 0 0 8px;
      color: var(--coral);
      font-size: 0.88rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    h2 {
      margin: 0;
      font-size: clamp(1.7rem, 3vw, 2.5rem);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .topic {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 6px 10px;
      border: 1px solid #cfe2df;
      border-radius: 6px;
      color: var(--teal-strong);
      background: #f1faf7;
      font-size: 0.9rem;
      font-weight: 750;
      white-space: nowrap;
    }

    .story-body {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(340px, 0.95fr);
      gap: 28px;
      padding: 24px;
    }

    .paragraph {
      margin-bottom: 24px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 24px;
    }

    .paragraph:last-child {
      margin-bottom: 0;
      border-bottom: 0;
      padding-bottom: 0;
    }

    .story-image {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      border-radius: var(--radius);
      border: 1px solid #ced7e2;
      background: #edf2f7;
    }

    .paragraph p {
      margin: 14px 0 0;
      font-size: 1.08rem;
    }

    .questions {
      align-self: start;
      border-left: 4px solid var(--gold);
      padding-left: 18px;
    }

    .questions h3 {
      margin: 0 0 14px;
      font-size: 1.18rem;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .question {
      margin-bottom: 16px;
    }

    .question label {
      display: block;
      margin-bottom: 7px;
      color: #26313f;
      font-weight: 750;
    }

    textarea {
      display: block;
      width: 100%;
      min-height: 86px;
      resize: vertical;
      border: 1px solid #c8d2df;
      border-radius: 6px;
      padding: 11px 12px;
      color: var(--ink);
      background: #fbfcfe;
      line-height: 1.45;
    }

    textarea::placeholder {
      color: #8a95a5;
    }

    .story-foot {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      padding: 18px 24px 24px;
      border-top: 1px solid var(--line);
      background: #fbfcfe;
    }

    .story-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .story-tab {
      width: 38px;
      height: 38px;
      color: var(--muted);
      background: #eef2f6;
    }

    .story-tab[aria-current="true"] {
      color: #ffffff;
      background: var(--teal);
    }

    .nav-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .primary-button {
      color: #ffffff;
      background: var(--teal);
      padding: 11px 16px;
    }

    .primary-button:hover {
      background: var(--teal-strong);
    }

    .secondary-button {
      color: var(--ink);
      background: #e8edf4;
      padding: 11px 16px;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.48;
    }

    details.teacher-notes {
      margin-top: 18px;
      border: 1px solid #cfd9e5;
      border-radius: var(--radius);
      background: #ffffff;
    }

    details.teacher-notes summary {
      cursor: pointer;
      padding: 14px 16px;
      color: var(--blue);
      font-weight: 800;
    }

    .teacher-lock {
      display: grid;
      gap: 10px;
      padding: 0 16px 16px;
      max-width: 460px;
    }

    .teacher-lock label {
      color: #26313f;
      font-weight: 750;
    }

    .teacher-lock-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .teacher-lock input {
      min-width: 210px;
      flex: 1 1 210px;
      border: 1px solid #c8d2df;
      border-radius: 6px;
      padding: 10px 12px;
      color: var(--ink);
      background: #fbfcfe;
      font: inherit;
    }

    .teacher-lock-message {
      min-height: 22px;
      margin: 0;
      color: var(--coral);
      font-size: 0.92rem;
      font-weight: 700;
    }

    .notes-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      padding: 0 16px 16px;
    }

    .note-block {
      border-top: 3px solid #d9e3ee;
      padding-top: 10px;
    }

    .note-block h4 {
      margin: 0 0 8px;
      font-size: 0.98rem;
      line-height: 1.2;
    }

    .note-block p,
    .note-block ul {
      margin: 0;
      color: #344050;
      font-size: 0.95rem;
    }

    .note-block ul {
      padding-left: 19px;
    }

    .note-block li + li {
      margin-top: 5px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 900px) {
      .story-body {
        grid-template-columns: 1fr;
      }

      .questions {
        border-left: 0;
        border-top: 4px solid var(--gold);
        padding-left: 0;
        padding-top: 18px;
      }
    }

    @media (max-width: 680px) {
      .app {
        padding: 14px;
      }

      .topbar,
      .story-head,
      .story-foot {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: stretch;
      }

      .top-actions,
      .nav-buttons {
        justify-content: stretch;
      }

      .top-actions button,
      .nav-buttons button {
        flex: 1 1 auto;
      }

      .status {
        width: 100%;
        text-align: left;
      }

      .story-head,
      .story-body,
      .story-foot {
        padding-left: 16px;
        padding-right: 16px;
      }

      .topic {
        justify-self: start;
        white-space: normal;
      }

      .notes-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

    function answerKey(storyId, questionId) {
      return `${APP_STORAGE_KEY}:${storyId}:${questionId}`;
    }

    function setSaveStatus(message) {
      saveStatus.textContent = message;
      window.clearTimeout(setSaveStatus.timer);
      setSaveStatus.timer = window.setTimeout(() => {
        saveStatus.textContent = "Saved on this device";
      }, 1400);

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderList(items) {
      return `<ul>${items.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>`;

              <p>${escapeHtml(notes.likelyExplanation)}</p>
            </section>
            <section class="note-block">
              <h4>Clues for that reason</h4>
              ${renderList(notes.likelyClues)}
            </section>
            <section class="note-block">
              <h4>Another possible reason</h4>
              <p>${escapeHtml(notes.otherExplanation)}</p>
            </section>
            <section class="note-block">
              <h4>Clues for another reason</h4>
              ${renderList(notes.otherClues)}
            </section>
            <section class="note-block">
              <h4>What we still do not know</h4>
              ${renderList(notes.unknowns)}
            </section>
            <section class="note-block">
              <h4>Possible next steps</h4>
              ${renderList(notes.nextSteps)}
            </section>
          </div>
        </details>
      `;
    }

    function renderStory() {
      const story = stories[currentStoryIndex];
      localStorage.setItem(`${APP_STORAGE_KEY}:currentStoryIndex`, String(currentStoryIndex));

      const paragraphs = story.paragraphs.map((paragraph) => `
        <section class="paragraph">
          <img class="story-image" src="${paragraph.imageSrc}" alt="${escapeHtml(paragraph.imageAlt)}" loading="eager">
          <p>${escapeHtml(paragraph.text)}</p>
        </section>
      `).join("");

      const questions = story.questions.map((question, index) => {
        const id = `${story.id}-${question.id}`;
        const saved = localStorage.getItem(answerKey(story.id, question.id)) || "";
        return `
          <div class="question">
            <label for="${id}">${index + 1}. ${escapeHtml(question.prompt)}</label>
            <textarea id="${id}" data-story-id="${story.id}" data-question-id="${question.id}" placeholder="Type your answer here.">${escapeHtml(saved)}</textarea>
          </div>
        `;
      }).join("");

      const tabs = stories.map((item, index) => `
        <button class="story-tab" type="button" data-story-index="${index}" aria-current="${index === currentStoryIndex ? "true" : "false"}" aria-label="Go to story ${index + 1}: ${escapeHtml(item.title)}">${index + 1}</button>
      `).join("");

      root.innerHTML = `
        <div class="story-head">
          <div>
            <p class="progress-label">Story ${currentStoryIndex + 1} of ${stories.length}</p>
            <h2>${escapeHtml(story.title)}</h2>
          </div>
          <div class="topic">${escapeHtml(story.topic)}</div>
        </div>

        <div class="story-body">
          <article>
            ${paragraphs}
            ${renderTeacherNotes(story.teacherNotes, story.id)}
          </article>

          <aside class="questions" aria-labelledby="questions-heading">
            <h3 id="questions-heading">Questions</h3>
            ${questions}
          </aside>
        </div>

        <div class="story-foot">
          <div class="story-tabs" aria-label="Story chooser">${tabs}</div>
          <div class="nav-buttons">
            <button class="secondary-button" type="button" id="back-button" ${currentStoryIndex === 0 ? "disabled" : ""}>Back</button>
            <button class="primary-button" type="button" id="next-button" ${currentStoryIndex === stories.length - 1 ? "disabled" : ""}>Next story</button>
          </div>
        </div>
      `;

      root.querySelectorAll("textarea").forEach((textarea) => {
        textarea.addEventListener("input", (event) => {
          const target = event.currentTarget;
          localStorage.setItem(answerKey(target.dataset.storyId, target.dataset.questionId), target.value);
          setSaveStatus("Saving...");
        });
      });

      root.querySelectorAll("[data-teacher-lock-form]").forEach((form) => {
        form.addEventListener("submit", (event) => {
          event.preventDefault();
          const input = form.querySelector("input[name='teacher-password']");
          const message = form.querySelector(".teacher-lock-message");
          if (input.value === TEACHER_GUIDE_PASSWORD) {
            teacherGuideUnlocked = true;
            sessionStorage.setItem(`${APP_STORAGE_KEY}:teacherGuideUnlocked`, "true");
            renderStory();
            document.getElementById(`teacher-notes-${story.id}`)?.setAttribute("open", "");
            return;
          }

          input.value = "";
          message.textContent = "That password did not work.";
          input.focus();
        });
      });

      root.querySelectorAll("[data-story-index]").forEach((button) => {
        button.addEventListener("click", (event) => {
          currentStoryIndex = Number(event.currentTarget.dataset.storyIndex);
          renderStory();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
      });

      document.getElementById("back-button").addEventListener("click", () => {
        if (currentStoryIndex > 0) {
          currentStoryIndex -= 1;
          renderStory();
          window.scrollTo({ top: 0, behavior: "smooth" });
        }
      });

      document.getElementById("next-button").addEventListener("click", () => {
        if (currentStoryIndex < stories.length - 1) {
          currentStoryIndex += 1;
          renderStory();
          window.scrollTo({ top: 0, behavior: "smooth" });
        }
      });
    }

    function collectAnswers() {
      return stories.map((story) => ({
        title: story.title,
        topic: story.topic,
        answers: story.questions.map((question) => ({
          question: question.prompt,
          answer: localStorage.getItem(answerKey(story.id, question.id)) || ""
        }))
      }));
    }

    function downloadAnswers() {
      const lines = [
        "Clue Stories Answers",
        `Saved: ${new Date().toLocaleString()}`,
        ""
      ];

      collectAnswers().forEach((story, storyIndex) => {
        lines.push(`Story ${storyIndex + 1}: ${story.title}`);
        lines.push(`Topic: ${story.topic}`);
        story.answers.forEach((item, questionIndex) => {
          lines.push(`${questionIndex + 1}. ${item.question}`);
          lines.push(item.answer.trim() ? item.answer.trim() : "[No answer yet]");
          lines.push("");
        });
      });

      const blob = new Blob([lines.join("\n")], { type: "text/plain;charset=utf-8" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = "clue-stories-answers.txt";
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(link.href);
    }

    downloadButton.addEventListener("click", downloadAnswers);
    renderStory();
  </script>
</body>
</html>
